<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Logs - Admin</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            line-height: 1.6;
            color: #333;
            background: #1e1e1e;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #e74c3c;
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .back-link {
            color: #ecf0f1;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .back-link:hover {
            color: white;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .subtitle {
            color: #ecf0f1;
            font-size: 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .log-container {
            background: #2d2d2d;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        .log-line {
            color: #d4d4d4;
            padding: 0.25rem 0;
            border-bottom: 1px solid #3e3e3e;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line:hover {
            background: #333;
        }

        .log-error {
            color: #f48771;
        }

        .log-warning {
            color: #dcdcaa;
        }

        .log-info {
            color: #4fc1ff;
        }

        .no-logs {
            color: #858585;
            text-align: center;
            padding: 3rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .controls {
            background: #2d2d2d;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .controls button {
            padding: 0.5rem 1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 0.5rem;
        }

        .controls button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
{% include '_admin_nav.html' %}
    <header>
        <div class="container">
            <h1>Error Logs</h1>
            <p class="subtitle">Last 500 log entries (newest first)</p>
        </div>
    </header>

    <div class="container">
        {% if message %}
        <div class="log-container">
            <div class="no-logs">{{ message }}</div>
        </div>
        {% elif logs %}
        <div class="controls">
            <button onclick="location.reload()">🔄 Refresh</button>
            <button onclick="filterLogs('ERROR')">❌ Errors Only</button>
            <button onclick="filterLogs('WARNING')">⚠️ Warnings Only</button>
            <button onclick="filterLogs('INFO')">ℹ️ Info Only</button>
            <button onclick="filterLogs('ALL')">📋 All</button>
        </div>

        <div class="log-container" id="logContainer">
            {% for log in logs %}
            <div class="log-line {% if 'ERROR' in log %}log-error{% elif 'WARNING' in log %}log-warning{% elif 'INFO' in log %}log-info{% endif %}"
                 data-level="{% if 'ERROR' in log %}ERROR{% elif 'WARNING' in log %}WARNING{% elif 'INFO' in log %}INFO{% else %}OTHER{% endif %}">{{ log|e }}</div>
            {% endfor %}
        </div>
        {% else %}
        <div class="log-container">
            <div class="no-logs">No log entries found</div>
        </div>
        {% endif %}
    </div>

    <script>
        function filterLogs(level) {
            const lines = document.querySelectorAll('.log-line');
            lines.forEach(line => {
                if (level === 'ALL') {
                    line.style.display = 'block';
                } else {
                    line.style.display = line.dataset.level === level ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
