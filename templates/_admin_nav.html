<style>
.admin-nav {
    background: #1a252f;
    padding: 0.6rem 0;
}
.admin-nav .container {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    flex-wrap: wrap;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
}
.admin-nav-label {
    color: #7f8c8d;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.5rem;
}
.admin-nav-link {
    color: #bdc3c7;
    text-decoration: none;
    font-size: 0.875rem;
    padding: 0.3rem 0.75rem;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
}
.admin-nav-link:hover { background: #2c3e50; color: white; }
.admin-nav-link.active { background: #2c3e50; color: white; font-weight: 600; }
.admin-nav-home { margin-left: auto; color: #7f8c8d; }
.admin-nav-home:hover { color: #ecf0f1; }
</style>
<nav class="admin-nav">
    <div class="container">
        <span class="admin-nav-label">Admin</span>
        <a href="/admin" class="admin-nav-link{% if request.path == '/admin' %} active{% endif %}">Dashboard</a>
        <a href="/admin/final-actions" class="admin-nav-link{% if request.path.startswith('/admin/final-actions') %} active{% endif %}">Final Actions</a>
        <a href="/admin/sponsors" class="admin-nav-link{% if request.path.startswith('/admin/sponsors') or request.path.startswith('/admin/merge-sponsors') %} active{% endif %}">Sponsors</a>
        <a href="/admin/news" class="admin-nav-link{% if request.path.startswith('/admin/news') %} active{% endif %}">News</a>
        <a href="/admin/donations" class="admin-nav-link{% if request.path.startswith('/admin/donations') %} active{% endif %}">Donations</a>
        <a href="/admin/logs" class="admin-nav-link{% if request.path.startswith('/admin/logs') %} active{% endif %}">Logs</a>
        <a href="/" class="admin-nav-link admin-nav-home">← Site</a>
    </div>
</nav>
